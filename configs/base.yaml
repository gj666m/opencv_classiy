# 全局基础配置
project:
  name: "基于OpenCV的垃圾智能分类系统"
  seed: 42

data:
  raw_dir: "data/trash_jpg/trash_jpg"
  processed_dir: "data/processed"
  split_dir: "data/split"
  meta_dir: "data/meta"
  num_workers: 8

model:
  name: "mobilenet_v3_small"
  num_classes: 4
  pretrained: true
  freeze_backbone: true
  input_size: 224

labels:
  0: "可回收物"
  1: "厨余垃圾"
  2: "有害垃圾"
  3: "其他垃圾"
  label_map:
    recyclable: 0
    kitchen: 1
    hazardous: 2
    other: 3

output:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  output_dir: "outputs"
